<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>cc-habits - your coding agents learn your habits</title>
    <meta
      name="description"
      content="cc-habits learns your coding style from your actual edits and feeds it back into every AI coding tool you use, automatically. One tool-agnostic memory layer across Claude Code, Gemini CLI, Codex, Kimi, Cursor, and Cline." />

    <!-- Display face: Silkscreen (bitmap-pixel mono, stands in for Departure Mono) -->
    <!-- Body face: JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="styles.css?v=8" />

    <link rel="icon" href="logo/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="logo/icon-32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="logo/icon-16.png" type="image/png" sizes="16x16" />
    <link rel="apple-touch-icon" href="logo/icon-180.png" />
    <meta property="og:image" content="logo/icon-512.png" />

    <!-- App: single pre-built, minified bundle (React compiled in, no runtime
         transpile, no third-party CDN). Built from *.jsx via `npm run build`. -->
    <link rel="preload" href="app.js?v=1" as="script" />
  </head>
  <body>
    <div id="app"></div>
    <script src="app.js?v=1" defer></script>
  </body>
</html>
