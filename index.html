function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
    </script>

const { useState, useEffect, useRef, useCallback, useMemo } = React;

function mulberry32(seed) {
  let s = seed >>> 0;
  return function () {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function Wordmark({ size = "1.25rem", showCursor = false, className = "" }) {
  return (
    <span
      className={`wordmark ${className}`}
      style={{ fontSize: size }}
      aria-label="cc-habits">
      cc-habits
      {showCursor ? <span className="wordmark__cursor" aria-hidden="true" /> : null}
    </span>
  );
}

function ButtonPrimary({ children, onClick, className = "", as = "button", href, ...rest }) {
  const cls = `btn btn--primary ${className}`;
  if (as === "a") {
    return (
      <a className={cls} href={href} {...rest}>
        {children}
      </a>
    );
  }
  return (
    <button className={cls} onClick={onClick} {...rest}>
      {children}
    </button>
  );
}

function ButtonGhost({ children, onClick, className = "", as = "button", href, ...rest }) {
  const cls = `btn btn--ghost ${className}`;
  if (as === "a") {
    return (
      <a className={cls} href={href} {...rest}>

function CopyCTA({
  text = "npm install -g cc-habits@latest",
  label,
  compactLabel,
  variant = "primary",
  withArrow = true,
}) {
  const [state, setState] = useState("idle");
  const timer = useRef(null);

  const handleCopy = useCallback(async () => {
    let ok = false;
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        ok = true;
      }
    } catch (e) {}

    if (!ok) {
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.top = "-1000px";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        ok = document.execCommand("copy");
        document.body.removeChild(ta);
      } catch (e) { ok = false; }
    }

    clearTimeout(timer.current);
    if (ok) {
      setState("flash");
      timer.current = setTimeout(() => setState("copied"), 80);
      setTimeout(() => setState("idle"), 1400);
    } else {
      setState("error");
      setTimeout(() => setState("idle"), 1400);
    }
  }, [text]);

  useEffect(() => () => clearTimeout(timer.current), []);

  const display =
    state === "copied" || state === "flash"
      ? "copied!"
      : state === "error"
      ? "select & copy"
      : null;

  const extraClass =
    state === "flash" ? "btn--flash-accent" : state === "error" ? "btn--err" : "";

  const Btn = variant === "ghost" ? ButtonGhost : ButtonPrimary;
  return (
    <Btn onClick={handleCopy} className={extraClass}>
      {display || (
        <>
          <span className="btn__label btn__label--desktop">{label || text}</span>
          <span className="btn__label btn__label--mobile">{compactLabel || label || text}</span>
        </>
      )}
      {withArrow && state === "idle" ? (
        <span className="arr" aria-hidden="true">→</span>
      ) : null}
    </Btn>
  );
}

function SplitText({ text, play = true, stagger = 60, className = "", as: As = "span" }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const spans = ref.current.querySelectorAll(".char");
    if (!play) {
      spans.forEach((s) => s.classList.remove("char--show"));
      return;
    }
    spans.forEach((s, i) => {
      setTimeout(() => s.classList.add("char--show"), i * stagger);
    });
  }, [play, stagger, text]);

  const words = useMemo(() => {
    const tokens = text.split(/(\s+)/);
    let globalIdx = 0;
    return tokens.map((token, ti) => {
      if (/^\s+$/.test(token)) {
        return <span key={`sp-${ti}`} style={{ display: "inline" }}>{token}</span>;
      }
      const wordSpans = [...token].map((ch) => {
        const idx = globalIdx++;
        return (
          <span key={idx} className="char">
            {ch}
          </span>
        );
      });
      return (
        <span key={`w-${ti}`} style={{ display: "inline-block", whiteSpace: "nowrap" }}>
          {wordSpans}
        </span>
      );
    });
  }, [text]);

  return (
    <As ref={ref} className={className}>
      {words}
    </As>
  );
}

    if (!sec) return;
    if (!("IntersectionObserver" in window)) return;
    const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduced) {

            io.unobserve(ent.target);
          }

    sec.querySelectorAll(".hiw__panel").forEach((el) => io.observe(el));
    return () => io.disconnect();

const RAIN_GLYPHS = "01<>[]/_-=+*.,;:#";

function RainBackground() {
  const t = useTweakValues();
  const canvasRef = React.useRef(null);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const atmo = t.atmosphere || "standard";
    const DENSITY = { calm: 0.6, standard: 1.0, storm: 1.5 }[atmo] || 1.0;
    const OPACITY = { calm: 0.13, standard: 0.22, storm: 0.36 }[atmo] || 0.22;

    let raf, swapTimer;
    let cells = [];
    let cols, rows, cellW, cellH;

    function readColors() {
      const styles = getComputedStyle(document.documentElement);
      return {
        dim: styles.getPropertyValue("--ink-dim").trim() || "#4A7A0A",
        accent: styles.getPropertyValue("--accent").trim() || "#00B7FF",
      };
    }
    let colors = readColors();

    function resize() {
      const w = window.innerWidth, h = window.innerHeight;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const baseCols = w < 700 ? 36 : 72;
      const baseRows = w < 700 ? 22 : 28;
      cols = Math.round(baseCols * DENSITY);
      rows = Math.round(baseRows * DENSITY);
      cellW = w / cols;
      cellH = h / rows;

      const rand = (function () { let s = 42; return () => { s = (s + 0x6D2B79F5) >>> 0; let x = Math.imul(s ^ (s >>> 15), s | 1); x ^= x + Math.imul(x ^ (x >>> 7), x | 61); return ((x ^ (x >>> 14)) >>> 0) / 4294967296; }; })();
      cells = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const ch = RAIN_GLYPHS[Math.floor(rand() * RAIN_GLYPHS.length)];
          const useAccent = rand() < 0.08;
          cells.push({ col: c, row: r, ch, alpha: 1, color: useAccent ? colors.accent : colors.dim });
        }
      }
      draw();
    }

    function draw() {
      const w = window.innerWidth, h = window.innerHeight;
      ctx.clearRect(0, 0, w, h);
      ctx.font = `${Math.max(9, Math.min(13, cellH * 0.62))}px "JetBrains Mono", monospace`;
      ctx.textBaseline = "middle";
      ctx.textAlign = "center";
      for (const cell of cells) {
        ctx.globalAlpha = cell.alpha * OPACITY;
        ctx.fillStyle = cell.color;
        ctx.fillText(cell.ch, cell.col * cellW + cellW / 2, cell.row * cellH + cellH / 2);
      }
      ctx.globalAlpha = 1;
    }

    function swap() {
      if (cells.length === 0) return;
      const n = Math.round(6 * DENSITY);
      const idxs = [];
      while (idxs.length < n) {
        const i = Math.floor(Math.random() * cells.length);
        if (!idxs.includes(i)) idxs.push(i);
      }
      const oldChars = idxs.map((i) => cells[i].ch);
      const newChars = idxs.map(() => RAIN_GLYPHS[Math.floor(Math.random() * RAIN_GLYPHS.length)]);
      const start = performance.now();
      const dur = 200;
      const step = (now) => {
        const tp = Math.min(1, (now - start) / dur);
        idxs.forEach((i, k) => {
          const phase = tp < 0.5 ? 1 - tp * 2 : (tp - 0.5) * 2;
          cells[i].alpha = phase;
          cells[i].ch = tp >= 0.5 ? newChars[k] : oldChars[k];
        });
        draw();
        if (tp < 1) raf = requestAnimationFrame(step);
        else { idxs.forEach((i) => (cells[i].alpha = 1)); draw(); }
      };
      raf = requestAnimationFrame(step);
    }

    resize();
    if (!reduceMotion) {
      const interval = { calm: 7000, standard: 5000, storm: 3000 }[atmo] || 5000;
      swapTimer = setInterval(swap, interval);
    }

    let resizeRaf;
    const onResize = () => { cancelAnimationFrame(resizeRaf); resizeRaf = requestAnimationFrame(() => { colors = readColors(); resize(); }); };
    window.addEventListener("resize", onResize);

    const mut = new MutationObserver(() => { colors = readColors(); for (let i = 0; i < cells.length; i++) { cells[i].color = (cells[i].color === colors.accent || cells[i].color === colors.dim) ? cells[i].color : (Math.random() < 0.08 ? colors.accent : colors.dim); } draw(); });
    mut.observe(document.body, { attributes: true, attributeFilter: ["data-palette"] });

    setTimeout(() => { colors = readColors(); resize(); }, 80);

    return () => {
      cancelAnimationFrame(raf);
      cancelAnimationFrame(resizeRaf);
      clearInterval(swapTimer);
      window.removeEventListener("resize", onResize);
      mut.disconnect();
    };
  }, [t.atmosphere, t.palette]);

  return <canvas ref={canvasRef} className="rain-canvas" aria-hidden="true" />;

const INTEGRATIONS = [
  { name: "Claude Code", key: "claude" },
  { name: "Gemini CLI", key: "googlegemini" },
  { name: "Codex", key: "openai" },
  { name: "Kimi", key: "kimi" },
  { name: "Cursor", key: "cursor" },
  { name: "Cline", key: "cline" },
  { name: "Windsurf", key: "windsurf" },
  { name: "Ollama", key: "ollama" },
];

function LogoMark({ item }) {
  // Real inline brand marks (Simple Icons paths), tinted to the theme via
  // currentColor. A monospace initial badge covers any missing key.
  const logo = LOGO_PATHS[item.key];
  if (logo) {
    const ds = logo.paths || [logo.d];
    return (
      <svg className="mq__logo" viewBox={logo.vb} width="22" height="22"
           role="img" aria-label={item.name} fill="currentColor">
        {ds.map((d, i) => <path key={i} d={d} />)}
      </svg>
    );
  }
  return <span className="mq__badge" aria-hidden="true">{item.name[0]}</span>;
}

function LogoMarquee() {
  // Duplicate the list so the -50% translate loops seamlessly.
  const items = [...INTEGRATIONS, ...INTEGRATIONS];
  return (
    <section className="mq" aria-label="Supported tools and integrations">
      <div className="mq__caption">works with your whole toolchain</div>
      <div className="mq__viewport">
        <div className="mq__track">
          {items.map((item, i) => (
            <div className="mq__item" key={i}>
              <LogoMark item={item} />
              <span className="mq__name">{item.name}</span>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    try {
      const stored = localStorage.getItem("cch_palette");
      if (stored && stored !== t.palette) setTweak("palette", stored);
    } catch (e) {}
  }, []);

  useEffect(() => {
    document.body.dataset.palette = t.palette || "acid";
    try { localStorage.setItem("cch_palette", t.palette || "acid"); } catch (e) {}
  }, [t.palette]);

  return (
    <TweaksContext.Provider value={{ values: t, set: setTweak }}>
      <RainBackground />
      <NavBar />
      <main>
        <Hero />
        <LogoMarquee />
        <TheProblem />
        <HowItWorks />
        <WhatItLearns />
        <Memories />
        <Guardrails />
        <UseAnywhere />
        <Install />
        <Faq />
        <FinalCta />
      </main>
      <Footer />

      <TweaksPanel>
        <TweakSection label="Palette" />
        <TweakToggle
          label="Night mode"
          value={t.palette === "crt"}
          onChange={(v) => setTweak("palette", v ? "crt" : "acid")}
        />
        <TweakSection label="Atmosphere" />
        <TweakRadio
          label="Energy"
          value={t.atmosphere}
          options={[
            { value: "calm", label: "calm" },
            { value: "standard", label: "std" },
            { value: "storm", label: "storm" },
          ]}
          onChange={(v) => setTweak("atmosphere", v)}
        />
      </TweaksPanel>
    </TweaksContext.Provider>
  );
}

window.COPY = COPY;
window.useTweakValues = useTweakValues;

const root = ReactDOM.createRoot(document.getElementById("app"));
root.render(<App />);
    </script>
