name: publish

# Publishes cc-habits to npm when a GitHub Release is published. Using the
# release event (rather than a raw tag push) keeps publishing a deliberate,
# reviewable step: draft the release, then publish it to ship the package.
#
# Auth is npm Trusted Publishing (OIDC): no NPM_TOKEN secret, nothing to rotate
# or leak. npm mints a short-lived credential from the GitHub Actions identity.
#
# Requirements:
#   - One-time setup on npmjs.com: package cc-habits -> Settings -> Trusted
#     Publisher -> GitHub Actions, with owner Shreyan1, repository cc-habits,
#     workflow filename publish.yml (no environment).
#   - npm >= 11.5.1 on the runner (the upgrade step below guarantees this).
#   - The release tag must be v<version> and match package.json (e.g. tag v0.8.0
#     for "version": "0.8.0"). The guard below fails the run on a mismatch so a
#     mistagged release never publishes the wrong version.

on:
  release:
    types: [published]
  # Manual fallback: run from the Actions tab against a chosen tag if a release
  # publish needs to be re-attempted without cutting a new release.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance (supply-chain attestation)

jobs:
  publish:
    name: build, verify, publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing needs npm >= 11.5.1; npm@latest (12.x) needs node >= 22,
      # hence the node 24 runner above.
      - name: Update npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${{ github.event.release.tag_name }}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Release tag $TAG does not match package.json version $PKG_VERSION." >&2
            exit 1
          fi
          echo "Version check passed: $TAG"

      # No token: with a trusted publisher configured on npmjs.com, npm >= 11.5.1
      # exchanges the workflow's OIDC identity for a short-lived publish credential.
      # Provenance attestation comes with it for free.
      - name: Publish to npm
        run: npm publish --provenance --access public
