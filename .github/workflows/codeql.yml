name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Mondays 10:00 UTC, offset from hook-schema-check by 1 hour.
    - cron: "0 10 * * 1"
  workflow_dispatch: {}

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Only flag HIGH + CRITICAL by default. The queries pack covers
          # injection, path traversal, ReDoS, insecure deserialization, and
          # prototype pollution — the threat classes cc-habits cares about.
          queries: security-and-quality

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (so CodeQL sees compiled output too)
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
